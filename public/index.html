const SCENE_W = WM.W, SCENE_H = WM.H, TS = WM.TS, GW = WM.GW, GH = WM.GH, GRID = WM.grid;

const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
let DPR=1, VW=0, VH=0, RS=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  VW=window.innerWidth; VH=window.innerHeight;
  canvas.width=Math.floor(VW*DPR); canvas.height=Math.floor(VH*DPR);
  canvas.style.width=VW+'px'; canvas.style.height=VH+'px';
  // cover-fit, but never smaller than height-fit (keeps mountains visible)
  RS=Math.max(VH/SCENE_H, VW/SCENE_W);
}
window.addEventListener('resize',resize); resize();

// scene image
const scene=new Image(); let ready=false;
scene.onload=()=>{ ready=true; const l=document.getElementById('loading'); if(l)l.style.display='none';
  document.getElementById('title').style.opacity='0'; };
scene.onerror=()=>{ document.getElementById('loading').textContent='Could not load assets/scene.jpg'; };
scene.src='assets/scene.jpg?v=3';

// player (world = scene px)
const player={ x:768, y:980, speed:230, face:'down', moving:false, anim:0 };
const PSCALE=2.0;   // character render scale

function cellBlocked(wx,wy){
  if(wx<0||wy<0||wx>=SCENE_W||wy>=SCENE_H) return true;
  return GRID[(wy/TS)|0][(wx/TS)|0]===0;
}
const FH=14, FV=8;
function feetBlocked(wx,wy){
  return cellBlocked(wx-FH,wy-FV)||cellBlocked(wx+FH,wy-FV)||cellBlocked(wx-FH,wy+FV)||cellBlocked(wx+FH,wy+FV)||cellBlocked(wx,wy);
}

// input
const keys={}; let hintGone=false;
function hideHint(){ if(!hintGone){ hintGone=true; const h=document.getElementById('hint'); if(h){h.style.opacity='0'; setTimeout(()=>h.remove(),700);} } }
addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k)) e.preventDefault();
  keys[k]=true; hideHint(); });
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
let stick={active:false,id:null,bx:0,by:0,dx:0,dy:0}; const SMAX=48;
canvas.addEventListener('touchstart',e=>{ for(const t of e.changedTouches){ if(!stick.active){
  stick.active=true; stick.id=t.identifier; stick.bx=t.clientX; stick.by=t.clientY; stick.dx=0; stick.dy=0; hideHint(); } }},{passive:true});
canvas.addEventListener('touchmove',e=>{ for(const t of e.changedTouches){ if(t.identifier===stick.id){
  let dx=t.clientX-stick.bx, dy=t.clientY-stick.by; const d=Math.hypot(dx,dy);
  if(d>SMAX){dx=dx/d*SMAX; dy=dy/d*SMAX;} stick.dx=dx; stick.dy=dy; } }},{passive:true});
function endT(e){ for(const t of e.changedTouches){ if(t.identifier===stick.id){ stick.active=false; stick.id=null; stick.dx=0; stick.dy=0; } } }
canvas.addEventListener('touchend',endT,{passive:true}); canvas.addEventListener('touchcancel',endT,{passive:true});

// camera (screen px)
const cam={x:0,y:0};
function updateCamera(){
  const sW=SCENE_W*RS, sH=SCENE_H*RS;
  let tx=player.x*RS - VW/2;
  let ty=player.y*RS - VH*0.62;        // keep player low, mountains up top
  cam.x=Math.max(0,Math.min(tx, Math.max(0,sW-VW)));
  cam.y=Math.max(0,Math.min(ty, Math.max(0,sH-VH)));
}
function w2s(wx,wy){ return [wx*RS-cam.x, wy*RS-cam.y]; }

// update
function readInput(){
  let ix=0,iy=0;
  if(keys['arrowleft']||keys['a']) ix-=1;
  if(keys['arrowright']||keys['d']) ix+=1;
  if(keys['arrowup']||keys['w']) iy-=1;
  if(keys['arrowdown']||keys['s']) iy+=1;
  if(stick.active){ ix+=stick.dx/SMAX; iy+=stick.dy/SMAX; }
  const m=Math.hypot(ix,iy); if(m>1){ix/=m;iy/=m;}
  return {ix,iy,mag:Math.min(m,1)};
}
function update(dt){
  const {ix,iy,mag}=readInput();
  player.moving=mag>0.08;
  if(player.moving){
    if(Math.abs(ix)>Math.abs(iy)) player.face=ix<0?'left':'right'; else player.face=iy<0?'up':'down';
    player.anim+=dt*8;
  } else player.anim=0;
  const step=player.speed*mag*dt;
  let nx=player.x+ix*step; if(!feetBlocked(nx,player.y)) player.x=nx;
  let ny=player.y+iy*step; if(!feetBlocked(player.x,ny)) player.y=ny;
  updateCamera();
}

// draw player (small adventurer placeholder)
function drawPlayer(){
  const [sx,sy]=w2s(player.x,player.y); const s=RS*PSCALE;
  const bob=player.moving?Math.abs(Math.sin(player.anim))*2*s:0;
  ctx.save(); ctx.globalAlpha=.35; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(sx,sy,11*s,4*s,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(sx,sy-bob);
  // legs
  ctx.fillStyle='#3a2c1c'; ctx.fillRect(-5*s,-12*s,4*s,12*s); ctx.fillRect(1*s,-12*s,4*s,12*s);
  // tunic
  ctx.fillStyle='#7a5a34'; ctx.beginPath();
  ctx.moveTo(-8*s,-12*s); ctx.lineTo(8*s,-12*s); ctx.lineTo(6*s,-30*s); ctx.lineTo(-6*s,-30*s); ctx.closePath(); ctx.fill();
  // pack strap
  ctx.fillStyle='#5a4022'; ctx.fillRect(-2*s,-30*s,4*s,18*s);
  // head
  ctx.fillStyle='#e9b489'; ctx.beginPath(); ctx.arc(0,-35*s,6*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5a3a22'; ctx.beginPath(); ctx.arc(0,-37*s,6*s,Math.PI,2*Math.PI); ctx.fill();
  // facing cue
  ctx.fillStyle='#2a1c12';
  if(player.face==='down'){ ctx.fillRect(-3*s,-35*s,1.6*s,1.6*s); ctx.fillRect(1.5*s,-35*s,1.6*s,1.6*s); }
  else if(player.face==='left'){ ctx.fillRect(-4*s,-35*s,1.8*s,1.8*s); }
  else if(player.face==='right'){ ctx.fillRect(2.2*s,-35*s,1.8*s,1.8*s); }
  ctx.restore();
}

// FFX-style minimap = the walk mesh
function drawMinimap(){
  const MMW=Math.min(150, VW*0.34), MMH=MMW*(SCENE_H/SCENE_W);
  const x0=12, y0=12;
  ctx.save();
  ctx.fillStyle='rgba(12,16,22,.55)';
  roundRect(x0-5,y0-5,MMW+10,MMH+10,7); ctx.fill();
  ctx.strokeStyle='rgba(220,225,235,.5)'; ctx.lineWidth=1.5; ctx.stroke();
  // walk cells
  const cw=MMW/GW, ch=MMH/GH;
  ctx.fillStyle='rgba(150,210,140,.55)';
  for(let gy=0;gy<GH;gy++) for(let gx=0;gx<GW;gx++){
    if(GRID[gy][gx]) ctx.fillRect(x0+gx*cw, y0+gy*ch, cw+0.6, ch+0.6);
  }
  // player marker
  const px=x0+(player.x/SCENE_W)*MMW, py=y0+(player.y/SCENE_H)*MMH;
  ctx.fillStyle='#ffd24a'; ctx.beginPath(); ctx.arc(px,py,3.2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a1208'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawJoy(){
  if(!stick.active) return;
  ctx.save(); ctx.globalAlpha=.45; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(stick.bx,stick.by,SMAX,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=.8; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(stick.bx+stick.dx,stick.by+stick.dy,18,0,Math.PI*2); ctx.fill(); ctx.restore();
}

function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#0a0c10'; ctx.fillRect(0,0,VW,VH);
  if(ready){
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(scene, -cam.x, -cam.y, SCENE_W*RS, SCENE_H*RS);
  }
  drawPlayer();
  drawMinimap();
  drawJoy();
}

let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){ let dt=(now-last)/1000; last=now; if(dt>0.1)dt=0.1;
  acc+=dt; while(acc>=STEP){ update(STEP); acc-=STEP; } render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

globalThis.T={ player, cam, cellBlocked, feetBlocked, update, SCENE_W, SCENE_H,
  setInput:(ix,iy)=>{ keys['arrowright']=ix>0; keys['arrowleft']=ix<0; keys['arrowdown']=iy>0; keys['arrowup']=iy<0; } };
</script>
